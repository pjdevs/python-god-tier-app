name: god-tier-app CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, Type & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: 🐍 Set up Python 3.14
        run: uv python install 3.14

      - name: 📦 Install dependencies
        run: uv sync --all-extras --dev

      - name: 🎨 Check Formatting (Ruff)
        run: uv run ruff format --check .

      - name: 🚨 Lint (Ruff)
        run: uv run ruff check .

      - name: 🧠 Type Check (Pyright)
        run: uv run pyright

      - name: 🧪 Run Tests and Coverage (Pytest)
        run: uv run pytest --cov=god_tier_app --cov-report=xml --cov-fail-under=80

      - name: Upload coverage xml
        uses: actions/upload-artifact@v3
        with:
          name: coverage-xml
          path: coverage.xml

      - name: 🏗️ Dry-run Build (Check "Compilation")
        run: uv build

      # - name: Credentials Security (Git Leaks)
      #   uses: gitleaks/gitleaks-action@v2

  coverage-to-gh-pages:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v3
        with:
          name: coverage-xml
          path: coverage/

      - uses: actions/setup-python@v4
        with:
          python-version: "3.14"

      - run: |
          pip install pytest-cov-to-badge
          pytest-cov-to-badge --input coverage/coverage.xml --output coverage.svg

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages || git checkout --orphan gh-pages
          git add coverage.svg
          git commit -m "Update coverage badge [skip ci]" || echo "No changes to commit"
          git push -u origin gh-pages
