name: god-tier-app CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, Type & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🚀 Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: 🐍 Set up Python 3.14
        run: task setup:python

      - name: 📦 Install dependencies
        run: task setup:dependencies

      - name: 🚨 Lint & 🎨 Format & 🧠 Type Check (Ruff & Pyright)
        run: task lint

      - name: 🧪 Run Tests and Coverage (Pytest)
        run: task test

      - name: Upload coverage xml
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml

      - name: 🏗️ Dry-run Build (Check "Compilation")
        run: task build

      # - name: Credentials Security (Git Leaks)
      #   uses: gitleaks/gitleaks-action@v2
